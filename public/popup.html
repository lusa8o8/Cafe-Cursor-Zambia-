<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickShare</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      color: #fff;
      min-width: 400px;
    }

    .container {
      padding: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .icon {
      width: 32px;
      height: 32px;
      background: #2563eb;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 18px;
    }

    .title {
      font-size: 20px;
      font-weight: 600;
    }

    .section {
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: #cbd5e1;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .qr-container {
      background: #334155;
      border: 1px solid #475569;
      border-radius: 8px;
      padding: 16px;
      text-align: center;
      margin-bottom: 16px;
    }

    #qrCode {
      max-width: 200px;
      margin: 0 auto;
    }

    .code-display {
      background: #1e293b;
      border: 2px solid #3b82f6;
      border-radius: 8px;
      padding: 16px;
      text-align: center;
      margin-bottom: 12px;
    }

    .code-number {
      font-size: 32px;
      font-weight: bold;
      color: #3b82f6;
      letter-spacing: 4px;
      font-family: 'Courier New', monospace;
      margin: 8px 0;
    }

    .session-info {
      background: #334155;
      border: 1px solid #475569;
      border-radius: 8px;
      padding: 12px;
      font-size: 13px;
      margin-bottom: 12px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .info-row:last-child {
      margin-bottom: 0;
    }

    .info-label {
      color: #94a3b8;
    }

    .info-value {
      color: #22c55e;
      font-weight: 600;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }

    button:hover {
      background: #1d4ed8;
    }

    button:disabled {
      background: #475569;
      cursor: not-allowed;
    }

    .button-group {
      display: flex;
      gap: 8px;
    }

    .button-group button {
      flex: 1;
    }

    .status {
      font-size: 12px;
      padding: 8px 12px;
      border-radius: 4px;
      margin-bottom: 12px;
      text-align: center;
    }

    .status.loading {
      background: #1e40af;
      color: #93c5fd;
    }

    .status.success {
      background: #064e3b;
      color: #86efac;
    }

    .status.error {
      background: #7c2d12;
      color: #fca5a5;
    }

    .action-buttons {
      display: flex;
      gap: 8px;
    }

    .action-buttons button {
      flex: 1;
      background: #0f766e;
      font-size: 12px;
      padding: 8px;
    }

    .action-buttons button:hover {
      background: #155e75;
    }

    .action-buttons button.primary {
      background: #2563eb;
    }

    .action-buttons button.primary:hover {
      background: #1d4ed8;
    }

    .loading-spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #475569;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 6px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .session-url {
      background: #1e293b;
      border: 1px solid #475569;
      border-radius: 4px;
      padding: 8px;
      font-size: 12px;
      word-break: break-all;
      font-family: 'Courier New', monospace;
      margin-bottom: 8px;
      color: #93c5fd;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="icon">🔄</div>
      <div class="title">QuickShare</div>
    </div>

    <div id="loading" style="text-align: center; padding: 20px;">
      <div class="loading-spinner"></div>
      Loading...
    </div>

    <div id="content" style="display: none;">
      <!-- Status Message -->
      <div id="statusMessage"></div>

      <!-- Session Info -->
      <div class="section">
        <div class="section-title">Session Active</div>
        <div class="session-info">
          <div class="info-row">
            <span class="info-label">Time Remaining</span>
            <span class="info-value" id="timeRemaining">--:--</span>
          </div>
          <div class="info-row">
            <span class="info-label">Files Shared</span>
            <span class="info-value" id="fileCount">0</span>
          </div>
        </div>
      </div>

      <!-- QR Code Section -->
      <div class="section">
        <div class="section-title">Scan QR Code</div>
        <div class="qr-container">
          <div id="qrCode"></div>
        </div>
      </div>

      <!-- Connection Code -->
      <div class="section">
        <div class="section-title">Connection Code</div>
        <div class="code-display">
          <p style="font-size: 12px; color: #94a3b8;">Share this 6-digit code</p>
          <div class="code-number" id="sessionCode">------</div>
        </div>
        <button onclick="copyCode()" style="margin-bottom: 12px;">📋 Copy Code</button>
      </div>

      <!-- Session URL (for testing) -->
      <div class="section">
        <div class="section-title">Session URL</div>
        <div class="session-url" id="sessionUrl">Loading...</div>
        <button onclick="openSession()" style="background: #059669;">🌐 Open in Browser</button>
      </div>

      <!-- Actions -->
      <div class="section">
        <div class="section-title">Actions</div>
        <div class="action-buttons">
          <button onclick="newSession()" style="background: #0f766e;">New Session</button>
          <button onclick="closeSession()" style="background: #7c2d12;">Close</button>
        </div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
